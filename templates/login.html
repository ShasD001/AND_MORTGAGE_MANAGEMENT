{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<h2>Login</h2>

<form method="POST">
    {{ form.hidden_tag() }}

    <label>Email</label>
    {{ form.email(class="input") }}

    <label>Password</label>
    {{ form.password(class="input") }}

    {{ form.submit(class="btn") }}
</form>
{% endblock %}
